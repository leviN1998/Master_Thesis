# General settings
generate_video: true               # Generate frame-based video
generate_hdf5: true                # Should events be saved
generate_event_video: false        # Generate event-based video 
save_blender: false                # Save Blender scene
random_orientation: false          # Randomize the initial orientation of the ball
fix_to_1_s: true                   # Fix the simulation to 1 second. recommended if using high rps and therefore low video-length

# simulation settings
total_frames: 500                  # Total number of frames to simulate
total_rotations: 2                 # Total number of rotations to simulate
ball_speed: 20.0                   # Speed of the ball in [m/s]   (100 kmh = 27.78 m/s)
ball_start: [0.0, 0.4, 0.0]        # Starting position of the ball in [m, m, m]
ball_end: [0.0, -0.4, 0.0]         # Ending position of the ball in [m, m, m]
video_fps: 30                      # Frames per second for the video
simulation_samples: 64             # Number of samples per frame for the simulation
ball_name: "Sphere"                # Name of the ball object in Blender

# camera settings
resolution_x: 1280                 # Horizontal resolution of the camera in pixels
resolution_y: 720                  # Vertical resolution of the camera in pixels
resolution_percentage: 100         # Percentage of the resolution to use (100% = full resolution)
focal_length: 9.0                  # Focal length of the camera in [mm]
pixel_pitch: 0.0075                # Pixel pitch of the camera in [mm]

# event camera settings
th_pos: 0.1                        # on threshold 
th_neg: 0.1                        # off threshold
th_n: 0.13                         # noise threshold                                     
lat: 400                           # latency
tau: 400                           # time constant
jit: 100                           # jitter
bgn: 0.0001                        # background noise
ref_period: 50                     # ref-time of the event camera

# bias settings
