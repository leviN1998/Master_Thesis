# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: realistic_topspin_regression.yaml
  - override /model: firenet_regression.yaml
  - override /callbacks: default.yaml
  - override /trainer: gpu.yaml
  - override /logger: wandb.yaml

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["topspin", "firenet_net", "regression"]

callbacks:
  model_checkpoint:
    monitor: "val/mean_deg"
    mode: "min"

  early_stopping:
    monitor: "val/mean_deg"
    patience: 100
    mode: "min"

# seed: 1234567

trainer:
  min_epochs: 10
  max_epochs: 500
  gradient_clip_val: 0.5


model:
  optimizer:
    lr: 3e-5
  net:
    #_target_: src.models.components.fire_net.FireNet
    #pretrained_weights: "logs/train/runs/2025-10-06_17-11-51/checkpoints/epoch_045.ckpt"
    hidden_channels: 16
    #kernel_size: 9
    head:
      #input_channels: 2
      output_channels: 3  # for regression of axis-angle vector


data:
  batch_size: 8
  num_workers: 2
  time_window: 7000
  num_bins: 10
  #train_val_test_split: [8, 1, 1]

logger:
  wandb:
    tags: ${tags}
    group: "topspin"
  aim:
    experiment: "topspin"