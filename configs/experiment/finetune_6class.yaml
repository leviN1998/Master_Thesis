# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: real_train.yaml
  - override /model: firenet_adaptive.yaml
  - override /callbacks: default.yaml
  - override /trainer: gpu.yaml
  - override /logger: wandb.yaml

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["topspin", "firenet_net"]

#ckpt_path: "logs/train/runs/2025-10-06_17-11-51/checkpoints/epoch_045.ckpt"
#ckpt_path: "logs/train/runs/2025-10-09_16-23-16/checkpoints/last.ckpt"


# seed: 1234567

trainer:
  min_epochs: 10
  max_epochs: 160
  gradient_clip_val: 0.5


model:
  optimizer:
    lr: 1e-5
  net:
    input_channels: 10
    pretrained_weights: "logs/train/runs/2025-10-21_17-42-06/checkpoints/epoch_093.ckpt"
    head: 
      _target_: src.models.components.subcomponents.AdaptiveAvgHead
      input_channels: 16
      hidden_channels: 32
      num_classes: 6
      pretrained_weights: "logs/train/runs/2025-10-21_17-42-06/checkpoints/epoch_093.ckpt"
  compile: false


data:
  batch_size: 8
  num_workers: 2
  time_window: 7000
  num_bins: 10

logger:
  wandb:
    tags: ${tags}
    group: "topspin"
  aim:
    experiment: "topspin"
