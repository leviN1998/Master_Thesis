# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: max_regression.yaml
  - override /model: firenet_regression.yaml
  - override /callbacks: default.yaml
  - override /trainer: gpu.yaml
  - override /logger: wandb.yaml

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["topspin", "firenet_net"]

# ckpt_path: "logs/train/runs/2025-07-31_14-25-04/checkpoints/epoch_009.ckpt"

# seed: 1234567

callbacks:
  model_checkpoint:
    monitor: "val/mean_deg"
    mode: "min"

  early_stopping:
    monitor: "val/mean_deg"
    patience: 100
    mode: "min"

trainer:
  min_epochs: 10
  max_epochs: 50
  gradient_clip_val: 0.5


model:
  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 1e-3
    weight_decay: 1e-4
  net:
    input_channels: 20
    head:
      _target_: src.models.components.subcomponents.SmallHead
      output_channels: 3  # for regression of axis-angle vector

  compile: false


data:
  batch_size: 16
  num_workers: 2
  time_window: 10000
  num_bins: 20
  #train_val_test_split: [10, 1, 1]

logger:
  wandb:
    tags: ${tags}
    group: "topspin"
  aim:
    experiment: "topspin"
