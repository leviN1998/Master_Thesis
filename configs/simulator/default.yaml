# General settings
generate_video: true                    # Generate frame-based video
generate_hdf5: true                     # Should events be saved
generate_event_video: false             # Generate event-based video
save_blender: false                     # Save Blender scene

# Spin settings
random_orientation: false               # Randomize the initial orientation of the ball
initital_orientation: [0.0, 0.0, 0.0]   # Initial orientation of the ball in [x, y, z] in axis-angle representation
spin_axis: [0.0, 0.0, 1.0]              # Axis of rotation in [x, y, z]

# Trajectory setting
ball_start: [0.0, -0.6, 0.0]             # Starting position of the ball in [m, m, m]
ball_end: [0.0, 0.6, 0.0]              # Ending position of the ball in [m, m, m]
ball_speed: 4.0                         # how flat should the curve be? (this will not affect real speed of the ball, just the curve)
angle_deg: 8.0                          # Angle in degrees (0 = horizontal, positive = upwards)
g: 9.81                                 # Gravitational acceleration in [m/s^2]

# simulation settings
frames: 500                             # Total number of frames to simulate
simulation_time: 150000                 # Simulation time in microseconds (1,000,000 us = 1 s = 1,000 milliseconds)
video_fps: 30                           # Frames per second for the video
simulation_samples: 64                  # Number of samples per frame for the simulation
ball_name: "Sphere"                     # Name of the ball object in Blender

# camera settings
resolution_x: 1280                      # Horizontal resolution of the camera in pixels
resolution_y: 720                       # Vertical resolution of the camera in pixels
resolution_percentage: 100              # Percentage of the resolution to use (100% = full resolution
focal_length: 9.0                       # Focal length of the camera in [mm]
pixel_pitch: 0.0075                     # Pixel pitch of the camera in [mm]

# event camera settings
th_pos: 0.15                            # on threshold
th_neg: 0.15                            # off threshold
th_n: 0.05                              # noise threshold
lat: 500                                # latency
tau: 70                                 # time constant
jit: 100                                # jitter
bgn: 0.0001                             # background noise
ref_period: 50                          # ref-time of the event camera